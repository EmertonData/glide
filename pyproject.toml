[project]
name = "glide"
version = "0.1.0"
description = "Rigorous GenAI evaluation with humans in the loop"
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.12"
dependencies = [
    "numpy>=2.4.2",
    "scipy>=1.17.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["glide"]

[dependency-groups]
dev = [
    "prek>=0.3.4",
    "pytest>=9.0.2",
    "pytest-coverage>=0.0",
    "ruff>=0.15.4",
    "ty>=0.0.20",
]

[tool.uv]
default-groups = ["dev"]

[tool.ruff]
line-length = 120
fix = true
lint.extend-select = ["E", "I"]

[tool.ty.analysis]
respect-type-ignore-comments = true

[tool.pytest.ini_options]
addopts = "--import-mode=importlib --doctest-modules"

[tool.coverage.run]
omit = ["glide/estimators/estimator_protocol.py"]
