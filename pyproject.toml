[project]
name = "starter-kit-python-open-source"
version = "0.1.0"
description = "Reference template for Open-Source Python projects"
readme = "README.md"
requires-python = ">=3.12"
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/starter_kit"]

[dependency-groups]
dev = [
    "prek>=0.3.4",
    "pytest>=9.0.2",
    "pytest-coverage>=0.0",
    "ruff>=0.15.4",
    "ty>=0.0.20",
]

[tool.uv]
default-groups = ["dev"]

[tool.ruff]
line-length = 120
fix = true
lint.extend-select = ["E", "I"]

[tool.ty.analysis]
respect-type-ignore-comments = true

[tool.pytest.ini_options]
addopts = "--import-mode=importlib"
