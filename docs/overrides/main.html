{% extends "base.html" %}

{% block content %}
{{ super() }}

{% if page.nb_url %}
    <div style="margin-top: 1rem;">
        <a href="{{ page.nb_url }}" style="display: inline-block; padding: 0.35rem 0.75rem; font-size: 0.8rem; font-weight: 500; color: #fff; background: linear-gradient(135deg, #6366f1, #06b6d4); border-radius: 4px; text-decoration: none;">
            {% if page.file.src_path.endswith('.ipynb') %}
                Click here to download this notebook
            {% else %}
                Click here to download this script
            {% endif %}
        </a>
    </div>
{% endif %}
{% endblock content %}
