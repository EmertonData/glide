site_name: Glide
site_url: https://glide-py.readthedocs.io/en/latest/
site_description: "Helping humans ride the GenAI evaluation wave"
site_author: Glide Team
repo_url: https://github.com/EmertonData/glide
repo_name: EmertonData/glide
theme:
  name: material
  logo: assets/logo-glide-no-bg.png
  favicon: assets/favicon-glide.png
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: light-blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: light-blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  custom_dir: docs/overrides
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

extra_css:
  - stylesheets/extra.css

hooks:
  - docs/hooks.py

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: numpy
            show_root_heading: true
            show_symbol_type_heading: true
            separate_signature: true
  - mkdocs-jupyter:
      include_source: true
      execute: true

markdown_extensions:
  - attr_list
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quickstart: getting-started/quickstart.ipynb
  - User Guide:
    - Overview: user_guide/index.md
    - Samplers: user_guide/samplers.md
    - Estimators: user_guide/estimators.md
    - Monitors: user_guide/monitors.md
  - Tutorials:
    - Overview and Selection Guide: tutorials/index.md
    - Standard annotation budget (PPI++): tutorials/ppi.ipynb
    - Stratified data (Stratified PPI++): tutorials/stratified_ppi.ipynb
    - Uncertainty scores available (ASI): tutorials/asi.ipynb
    - Clustered data (Clustered PPI++): tutorials/clustered_ppi.ipynb
    - Multiple Proxies (Multi-PPI++): tutorials/multi_ppi.ipynb
    - Cost estimates available (Cost-Optimal Random Sampling): tutorials/cost_optimal_random.ipynb
    - Cost and uncertainty scores available (Cost-Optimal Sampling): tutorials/cost_optimal.ipynb
    - Monitoring a deployed system for drift (PPRM): tutorials/empirical_ppi_monitor.ipynb
  - Deep Dive:
    - Overview: deep_dive/index.md
    - Scientific Validation:
      - Estimators:
        - Methodology: deep_dive/scientific_validation/estimators/methodology.md
        - PPI Validation: deep_dive/scientific_validation/estimators/ppi.ipynb
        - Stratified PPI Validation: deep_dive/scientific_validation/estimators/stratified_ppi.ipynb
        - ASI Validation: deep_dive/scientific_validation/estimators/asi.ipynb
        - Clustered PPI Validation: deep_dive/scientific_validation/estimators/clustered_ppi.ipynb
        - Multi-PPI Validation: deep_dive/scientific_validation/estimators/multi_ppi.ipynb
        - PTD Validation: deep_dive/scientific_validation/estimators/ptd.ipynb
        - Stratified PTD Validation: deep_dive/scientific_validation/estimators/stratified_ptd.ipynb
        - IPW PTD Validation: deep_dive/scientific_validation/estimators/ipwptd.ipynb
        - Clustered PTD Validation: deep_dive/scientific_validation/estimators/clustered_ptd.ipynb
      - Monitors:
        - PPI Monitor validation: deep_dive/scientific_validation/monitors/empirical_ppi.ipynb
    - Case Studies:
      - Agentic System Evaluation: deep_dive/case_studies/r_judge.ipynb
      - Text-to-SQL Accuracy Estimation: deep_dive/case_studies/spider.ipynb
  - Contributing: contributing.md
  - API Reference:
    - Overview: api/index.md
    - Simulators: api/simulators.md
    - Samplers: api/samplers.md
    - Estimators: api/estimators.md
    - Monitors: api/monitors.md
    - Confidence Intervals: api/confidence_intervals.md
    - Confidence Sequences: api/confidence_sequences.md
    - Inference Results: api/mean_inference_results.md
    - Monitoring Results: api/mean_monitoring_results.md
    - Scientific Validation: api/scientific_validation.md
    - I/O: api/io.md

