site_name: Glide
site_url: https://glide-py.readthedocs.io/en/latest/
site_description: "Helping humans ride the GenAI evaluation wave"
site_author: Glide Team
repo_url: https://github.com/EmertonData/glide
repo_name: EmertonData/glide
theme:
  name: material
  logo: assets/logo-glide-no-bg.png
  favicon: assets/favicon-glide.png
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: light-blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: light-blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  custom_dir: docs/overrides
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            show_submodules: false
            show_root_heading: false
            group_by_category: false
            show_category_heading: false
            show_root_toc_entry: false
  - mkdocs-jupyter:
      include_source: true
      execute: true

markdown_extensions:
  - attr_list
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quickstart: getting-started/quickstart.ipynb
  - User Guide: 
    - Evaluation Workflow: user_guide/evaluation_workflow.md
    - Samplers: user_guide/samplers.md
    - Estimators: user_guide/estimators.md
    - Which estimator to use: user_guide/which_estimator_to_use.md
  - Tutorials:
    - PPI: tutorials/ppi.ipynb
    - Stratified PPI: tutorials/stratified_ppi.ipynb
    - ASI: tutorials/asi.ipynb
  - Deep Dive:
    - PPI Validation: deep_dive/ppi_validation.ipynb
    - Stratified PPI Validation: deep_dive/stratified_ppi_validation.ipynb
    - ASI Validation: deep_dive/asi_validation.ipynb
  - Contributing: contributing.md
  - API Reference:
    - Core:
      - Datasets: api/core/datasets.md
      - Mean Inference Results: api/core/mean_inference_results.md
    - Samplers: api/samplers.md
    - Estimators: api/estimators.md
    - Confidence Intervals: api/confidence_intervals.md
    - I/O: api/io.md
