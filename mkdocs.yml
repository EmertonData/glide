site_name: Glide
theme:
  name: material
  custom_dir: docs/overrides

plugins:
  - search
  - mkdocstrings
  - mkdocs-jupyter:
      include_source: true
      execute: true
#      execute: false

markdown_extensions:
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Quickstart: examples/quickstart.ipynb
  - Why use Glide ?: examples/why_use_glide.ipynb
  - User guide: user_guide/guide.md
  - API Reference: api/index.md
