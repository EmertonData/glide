site_name: Glide
theme:
  name: material
  custom_dir: docs/overrides
  features:
    - content.code.copy

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            show_submodules: false
            group_by_category: true
            show_category_heading: true
  - mkdocs-jupyter:
      include_source: true
      execute: true

markdown_extensions:
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Quickstart: examples/quickstart.ipynb
  - Why use Glide ?: examples/why_use_glide.ipynb
  - User guide: user_guide/guide.md
  - Examples:
    - examples/scientific_validation_PPI.ipynb
  - API Reference:
    - Overview: api/index.md
    - Core:
      - Datasets: api/core/datasets.md
      - Mean Inference Results: api/core/mean_inference_results.md
    - Estimators: api/estimators.md
    - I/O: api/io.md
