[[repos]]
repo = "https://github.com/kynan/nbstripout"
rev = "0.9.1"
hooks = [{ id = "nbstripout" }]

[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.15.4"
hooks = [
  { id = "ruff-format" },
  { id = "ruff", args = ["--fix"] },
]

[[repos]]
repo = "local"
hooks = [
  { id = "normalize-notebooks", name = "Normalize notebook source format", entry = "uv run python -c 'import glob, nbformat; [nbformat.write(nbformat.read(f, 4), f) for f in glob.glob(\"docs/**/*.ipynb\", recursive=True)]'", language = "system", pass_filenames = false },
  { id = "ty", name = "ty", entry = "uv run ty check", language = "system", types_or = ["python", "jupyter"], pass_filenames = false },
  { id = "mkdocs-execute", name = "mkdocs-execute must be true", entry = "bash -c '! grep -E \"^[[:space:]]*execute:[[:space:]]*false\" mkdocs.yml'", language = "system", files = "mkdocs\\.yml", pass_filenames = false },
]
